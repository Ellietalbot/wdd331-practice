<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Scroll Snap Demo</title>
    <link rel="stylesheet" href="snap-carousel.css">
</head>
<body>

    <header>
        <h1>CSS Scroll Snap Demo</h1>
    </header>

    <main>

        <section class="content-section">
            <h2>Horizontal Card Carousel</h2>

            <div class="carousel">

                <article class="carousel-card">
                    <h3>Mandatory</h3>
                    <p>Always snaps to the nearest card.</p>
                </article>

                <article class="carousel-card">
                    <h3>Proximity</h3>
                    <p>Only snaps when close to a snap point.</p>
                </article>

                <article class="carousel-card">
                    <h3>Snap Align</h3>
                    <p>Controls where each item lands.</p>
                </article>

                <article class="carousel-card">
                    <h3>Snap Stop</h3>
                    <p>Prevents users from skipping cards.</p>
                </article>

                <article class="carousel-card">
                    <h3>Accessibility</h3>
                    <p>Works with touch and keyboard navigation.</p>
                </article>

            </div>
        </section>



    </main>

</body>
</html>
